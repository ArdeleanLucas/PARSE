name: Desktop macOS Packaging

# Gate B: freeze the Python backend with PyInstaller and assemble a macOS DMG/zip
# via electron-builder, all on a real arm64 macOS runner. This is CI-driven
# packaging (not local builds) — the freeze needs the heavy ML stack installed,
# which only happens here.
#
# Triggers:
#   * workflow_dispatch — manual runs (`gh workflow run desktop-macos.yml`).
#   * push on the packaging branch — so iterating on the spec/config re-runs CI.

on:
  workflow_dispatch:
  push:
    branches:
      - desktop-stage3-packaging-macos
    paths:
      - "packaging/**"
      - "desktop/**"
      - ".github/workflows/desktop-macos.yml"
      - "python/requirements.txt"
      - "python/requirements.lock*.txt"

permissions:
  contents: read

concurrency:
  group: desktop-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  # Bundled read-only IPA acoustic model (hybrid-delivery decision, §9.4). The
  # fetch step below stages this HF repo into dist/bundled-models/<id>/ and
  # electron-builder copies it to the app's Resources/models/. Kept here so the
  # download step and the actions/cache key share one source of truth.
  BUNDLED_MODEL_REPO: "facebook/wav2vec2-xlsr-53-espeak-cv-ft"
  BUNDLED_MODEL_ID: "wav2vec2-xlsr-53-espeak-ipa"
  BUNDLED_MODELS_STAGE_DIR: "dist/bundled-models"

defaults:
  run:
    shell: bash

jobs:
  package-macos:
    name: Freeze backend + build macOS DMG
    runs-on: macos-14 # arm64 (Apple silicon) runner.
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Frontend: build the React SPA into dist/ (server + app both serve it). --- #
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      # Mirror ci.yml: cache the fully materialized node_modules so repeat runs
      # can skip `npm ci` for the frontend build.
      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-

      - name: Install frontend dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build frontend
        run: npm run build

      # --- Backend: install the heavy stack + PyInstaller, then freeze. --- #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-${{ hashFiles('python/requirements.lock.macos-py312.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-

      # Install from the committed, fully-pinned lock (not the floor-pinned
      # python/requirements.txt) so the freeze is reproducible build-to-build.
      # The lock already pins pyinstaller, so no separate install line for it.
      - name: Install backend dependencies + PyInstaller (from lock)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.lock.macos-py312.txt

      # Drift snapshot: capture what this real macOS/py3.12 build actually
      # resolved. This is NOT the lock (python/requirements.lock.macos-py312.txt,
      # committed to the repo, is) — it's a diff surface for detecting when the
      # committed lock has drifted from what a fresh resolve would produce, e.g.
      # after bumping a floor pin in python/requirements.txt.
      - name: Capture dependency drift snapshot
        run: |
          pip freeze > /tmp/requirements.drift-snapshot.macos-py312.txt
          echo "Captured $(wc -l < /tmp/requirements.drift-snapshot.macos-py312.txt) resolved packages."

      - name: Upload dependency drift snapshot
        uses: actions/upload-artifact@v4
        with:
          name: requirements-drift-snapshot-macos-py312
          path: /tmp/requirements.drift-snapshot.macos-py312.txt
          if-no-files-found: error
          retention-days: 7

      # --- Freeze the backend into dist/parse-backend/. --- #
      - name: Freeze backend with PyInstaller
        run: |
          pyinstaller --noconfirm --clean packaging/parse-backend.spec
          echo "--- dist/parse-backend/ ---"
          ls -la dist/parse-backend/ | head -40

      # --- Smoke test: the frozen backend must actually boot and answer health. --- #
      # This proves the freeze pulled in every runtime dependency. If the binary
      # never becomes healthy, FAIL the job (no continue-on-error anywhere here).
      - name: Smoke-test frozen backend (/api/health)
        run: |
          set -euo pipefail
          PORT=8799
          export PARSE_DESKTOP=1
          export PARSE_API_PORT="${PORT}"
          "./dist/parse-backend/parse-backend" >/tmp/parse-backend-smoke.log 2>&1 &
          backend_pid=$!
          cleanup() {
            kill "${backend_pid}" 2>/dev/null || true
            wait "${backend_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          healthy=0
          for _ in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:${PORT}/api/health" >/tmp/parse-backend-health.json 2>/dev/null; then
              healthy=1
              break
            fi
            if ! kill -0 "${backend_pid}" 2>/dev/null; then
              echo "::error::frozen backend exited before serving /api/health"
              cat /tmp/parse-backend-smoke.log || true
              exit 1
            fi
            sleep 1
          done

          if [ "${healthy}" -ne 1 ]; then
            echo "::error::frozen backend never became healthy within 60s"
            cat /tmp/parse-backend-smoke.log || true
            exit 1
          fi

          echo "Health response:"
          cat /tmp/parse-backend-health.json
          echo
          echo "Frozen backend health smoke test PASSED."

      - name: Upload frozen backend smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frozen-backend-smoke-log
          path: /tmp/parse-backend-smoke.log
          if-no-files-found: ignore
          retention-days: 7

      # --- Stage the bundled read-only IPA model (hybrid delivery, §9.4). --- #
      # desktop/scripts/fetch-bundled-models.py snapshot_downloads the wav2vec2
      # IPA repo into dist/bundled-models/<id>/ and writes a manifest.json, so
      # electron-builder's extraResources copies it to the app's Resources/models/
      # and the Electron shell sets PARSE_BUNDLED_MODELS at launch. This must run
      # AFTER the Python deps install (the script needs huggingface_hub, which the
      # lock provides) and BEFORE the DMG build (electron-builder reads the staged
      # dir). The ~1.2GB download grows the DMG (~684MB -> ~1.9GB) BY DESIGN —
      # hybrid delivery bundles only the IPA core; the STT model is a first-run
      # fetch handled by the frontend install pipeline (tracked separately).
      - name: Cache bundled IPA model
        id: bundled-model-cache
        uses: actions/cache@v4
        with:
          # Cache the staged model dir so the ~1.2GB download is not repeated on
          # every run. Keyed on the model repo id + slug so a repo/id change
          # invalidates the cache.
          path: ${{ env.BUNDLED_MODELS_STAGE_DIR }}
          key: ${{ runner.os }}-bundled-model-${{ env.BUNDLED_MODEL_ID }}-${{ hashFiles('desktop/scripts/fetch-bundled-models.py') }}
          restore-keys: |
            ${{ runner.os }}-bundled-model-${{ env.BUNDLED_MODEL_ID }}-

      # Skip the ~1.2GB download entirely on a cache hit (mirrors the
      # node_modules cache guard above); the packaged-app smoke step still
      # asserts the manifest is present inside the built .app.
      - name: Fetch bundled IPA model
        if: steps.bundled-model-cache.outputs.cache-hit != 'true'
        run: |
          python desktop/scripts/fetch-bundled-models.py \
            --repo-id "${BUNDLED_MODEL_REPO}" \
            --id "${BUNDLED_MODEL_ID}" \
            --dest-root "${BUNDLED_MODELS_STAGE_DIR}"
          echo "--- ${BUNDLED_MODELS_STAGE_DIR}/${BUNDLED_MODEL_ID}/ ---"
          ls -la "${BUNDLED_MODELS_STAGE_DIR}/${BUNDLED_MODEL_ID}/"
          test -f "${BUNDLED_MODELS_STAGE_DIR}/${BUNDLED_MODEL_ID}/manifest.json"

      # --- Package: electron-builder assembles the DMG/zip and bundles the freeze. --- #
      - name: Install desktop shell dependencies
        run: |
          cd desktop
          npm ci

      - name: Build macOS DMG + zip (unsigned)
        env:
          # Signing/notarization is Gate C. Force an unsigned build so
          # electron-builder does not attempt to discover a signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          cd desktop
          npx electron-builder --config electron-builder.yml --mac --arm64 --publish never

      # --- End-to-end smoke test: the ASSEMBLED .app's bundled backend. --- #
      # Distinct from the earlier freeze smoke, which tests the raw
      # dist/parse-backend/ onedir BEFORE packaging. This one drives the backend
      # as it actually ships inside PARSE.app — electron-builder's copy of the
      # onedir under Contents/Resources/backend/, with the afterPack +x-bit fix
      # applied. It proves, end-to-end:
      #   1. the exec bit survived the extraResources copy (afterPack's guarantee),
      #   2. the frozen backend inside the packaged .app actually launches, and
      #   3. /api/health responds — i.e. the shipped app's backend works.
      # We launch the backend executable DIRECTLY (not via Electron), so no GUI
      # or virtual display is needed on the runner. A FULL Electron-GUI launch —
      # the renderer spawning the backend through backend-supervisor.js — is a
      # separate future step that needs a virtual display.
      - name: Smoke-test packaged app backend
        env:
          # The smoke script also asserts the bundled IPA model shipped at
          # Resources/models/${BUNDLED_MODEL_ID}/manifest.json — pass the id so it
          # matches the fetch step above rather than relying on its default.
          BUNDLED_MODEL_ID: ${{ env.BUNDLED_MODEL_ID }}
        run: bash desktop/scripts/smoke-packaged-backend.sh

      - name: Upload packaged backend smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packaged-backend-smoke-log
          path: /tmp/parse-packaged-backend-smoke.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload macOS installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parse-desktop-macos-arm64
          path: |
            desktop/build/dist/*.dmg
            desktop/build/dist/*.zip
          if-no-files-found: error
          retention-days: 7
