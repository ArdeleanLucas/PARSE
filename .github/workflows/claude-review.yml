name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this PR thoroughly. Focus on:
            - Logic bugs and correctness
            - TypeScript type safety issues
            - React hook/component anti-patterns
            - Missing or inadequate test coverage
            - Consistency with existing codebase conventions
            Post inline comments where relevant and a concise summary at the end.
