# electron-builder configuration — PARSE desktop app (macOS, Gate B).
#
# This is a STANDALONE config (passed via `--config electron-builder.yml`) so we
# do NOT have to add a `build` block to desktop/package.json. Keeping it separate
# avoids conflicting with in-flight PRs that touch package.json.
#
# What this produces: an unsigned macOS `.dmg` + `.zip` for arm64 that bundles
# the PyInstaller-frozen backend under `Contents/Resources/backend/`.
#
# Signing/notarization is Gate C, intentionally OFF here. The CI workflow sets
# `CSC_IDENTITY_AUTO_DISCOVERY=false` so electron-builder never tries to sign,
# and no signing identity is referenced anywhere in this file.

appId: org.parse.desktop
productName: PARSE

# electron-builder runs from the `desktop/` directory (CI does `cd desktop`),
# so all paths below are relative to `desktop/`.
directories:
  output: build/dist        # artifacts (.dmg/.zip) land in desktop/build/dist/
  buildResources: build/resources

# Files copied into the app's app.asar (the Electron JS shell). The frozen
# Python backend is NOT here — it goes in via `extraResources` below so it stays
# an unpacked, directly-spawnable directory tree.
files:
  - main.js
  - preload.js
  - backend-supervisor.js
  - backend-launcher.js
  - project-store.js
  - afterPack.js
  - package.json
  - "!test/**"
  - "!dev-launch.js"
  - "!electron-builder.yml"

# Guarantee the frozen backend's executable bit survives the extraResources copy
# (see afterPack.js). Without it, a dropped +x bit makes the shipped .app trip
# the supervisor's missing-exe guard and never launch its backend.
afterPack: ./afterPack.js

# Bundle the PyInstaller onedir output into the app.
#   from: ../dist/parse-backend        (PyInstaller writes dist/parse-backend/ at repo root)
#   to:   backend/parse-backend         (-> Contents/Resources/backend/parse-backend/ in the .app)
#
# IMPORTANT — electron-builder copies the CONTENTS of the `from` directory into
# `to`, NOT the `from` directory itself. So `from: ../dist/parse-backend` +
# `to: backend` would land the onedir contents directly in `Resources/backend/`,
# putting the entry exe at `Resources/backend/parse-backend`. But both
# backend-launcher.js (runtime) and afterPack.js (packaging) expect the nested
# `Resources/backend/parse-backend/parse-backend`. Setting `to:
# backend/parse-backend` re-creates that intermediate directory so the exe lands
# at `Resources/backend/parse-backend/parse-backend` — matching both files.
# At runtime a packaged main.js spawns:
#   `${process.resourcesPath}/backend/parse-backend/parse-backend`
extraResources:
  - from: ../dist/parse-backend
    to: backend/parse-backend
    filter:
      - "**/*"

# --- macOS target ---------------------------------------------------------- #
mac:
  category: public.app-category.education
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  # Signing is Gate C. Leave identity unset; the workflow also exports
  # CSC_IDENTITY_AUTO_DISCOVERY=false so electron-builder does an unsigned build.
  # hardenedRuntime / notarization are deliberately omitted until Gate C.
  artifactName: "${productName}-${version}-${arch}.${ext}"

dmg:
  # Simple default DMG layout; a custom background/window is a later polish item.
  title: "${productName} ${version}"

# Never publish to a release provider from CI — artifacts are uploaded via the
# workflow's upload-artifact step instead. The workflow also passes
# `--publish never` explicitly as a belt-and-suspenders guard.
publish: null
