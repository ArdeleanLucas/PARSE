<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <style>
      .bg { fill: #020617; }
      .grid { stroke: #1e293b; stroke-width: 1; opacity: .55; }
      .title { font: 800 46px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; letter-spacing: .2px; }
      .subtitle { font: 500 21px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .ribbon { fill: rgba(15,23,42,.92); stroke: #334155; stroke-width: 1.5; }
      .ribbonText { font: 600 21px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .stageNum { font: 800 24px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #020617; }
      .stageTitle { font: 800 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .stageSub { font: 650 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 500 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .tiny { font: 600 11px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .label { font: 700 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .muted { fill: #94a3b8; }
      .box { fill: #0f172a; stroke-width: 2.2; rx: 22; filter: url(#shadow); }
      .ui { stroke: #22d3ee; }
      .job { stroke: #34d399; }
      .chunk { stroke: #fbbf24; }
      .data { stroke: #a78bfa; }
      .err { stroke: #fb7185; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrowAmber { stroke: #fbbf24; stroke-width: 4; fill: none; marker-end: url(#arrowAmber); }
      .dash { stroke-dasharray: 8 7; }
      .pillText { font: 800 12px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #020617; }
      .mono { font: 700 13px 'JetBrains Mono', 'Consolas', monospace; fill: #e2e8f0; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" class="grid" fill="none"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fbbf24"/>
    </marker>
    <linearGradient id="wave" x1="0" x2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset=".55" stop-color="#fbbf24"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1800" height="1050"/>
  <rect width="1800" height="1050" fill="url(#grid)" opacity=".75"/>

  <text x="70" y="78" class="title">Long-File Processing Flow</text>
  <text x="70" y="112" class="subtitle">How PARSE turns one long recording into bounded chunks, robust processing, merged timestamps, and user-visible results.</text>

  <rect x="70" y="145" width="1660" height="66" rx="18" class="ribbon"/>
  <circle cx="106" cy="178" r="8" fill="#34d399"/>
  <text x="130" y="185" class="ribbonText">Long recordings are bounded by chunk size, isolated from the parent server, and merged into one usable transcript or annotation result.</text>

  <!-- arrows behind cards -->
  <path d="M380 466 C425 466 438 466 475 466" class="arrow"/>
  <path d="M690 466 C735 466 748 466 785 466" class="arrow"/>
  <path d="M1000 466 C1045 466 1058 466 1095 466" class="arrow"/>
  <path d="M1310 466 C1355 466 1368 466 1405 466" class="arrow"/>

  <!-- Stage 1 -->
  <g transform="translate(70,260)">
    <rect width="310" height="420" rx="24" class="box ui"/>
    <circle cx="36" cy="38" r="18" fill="#22d3ee"/><text x="29" y="46" class="stageNum">1</text>
    <text x="68" y="46" class="stageTitle">JOB CREATED</text>
    <text x="28" y="82" class="stageSub">Full-file STT or full-mode ORTH</text>
    <rect x="28" y="112" width="254" height="82" rx="14" fill="rgba(8,51,68,.55)" stroke="#22d3ee"/>
    <text x="48" y="142" class="label">Browser / API request</text>
    <text x="48" y="168" class="small muted">User starts robust compute</text>
    <path d="M155 204 V244" class="arrow"/>
    <rect x="28" y="246" width="254" height="108" rx="14" fill="rgba(6,78,59,.48)" stroke="#34d399"/>
    <text x="48" y="276" class="label">Job registry</text>
    <text x="48" y="302" class="small">• Job ID</text>
    <text x="48" y="326" class="small">• status polling</text>
    <text x="48" y="350" class="small">• cancel flag + progress</text>
    <rect x="68" y="374" width="174" height="28" rx="14" fill="#22d3ee"/>
    <text x="92" y="393" class="pillText">Header job strip</text>
  </g>

  <!-- Stage 2 -->
  <g transform="translate(475,260)">
    <rect width="215" height="420" rx="24" class="box chunk"/>
    <circle cx="36" cy="38" r="18" fill="#fbbf24"/><text x="29" y="46" class="stageNum">2</text>
    <text x="68" y="38" class="stageTitle">CHUNKING</text>
    <text x="68" y="62" class="stageTitle">DECISION</text>
    <text x="28" y="98" class="stageSub">Intent first, duration second</text>
    <text x="28" y="132" class="small">• Robust full-file work</text>
    <text x="28" y="156" class="small">• Default: 10 min chunks</text>
    <text x="28" y="180" class="small">• Short files: single-shot</text>
    <text x="28" y="204" class="small">• Scoped windows: fast path</text>
    <path d="M34 255 C52 220 70 292 88 255 S124 220 142 255 S178 292 194 255" stroke="url(#wave)" stroke-width="5" fill="none"/>
    <rect x="28" y="290" width="48" height="56" rx="10" fill="rgba(251,191,36,.25)" stroke="#fbbf24"/><text x="38" y="322" class="tiny">0-10m</text>
    <rect x="83" y="290" width="48" height="56" rx="10" fill="rgba(251,191,36,.25)" stroke="#fbbf24"/><text x="90" y="322" class="tiny">10-20m</text>
    <rect x="138" y="290" width="48" height="56" rx="10" fill="rgba(251,191,36,.25)" stroke="#fbbf24"/><text x="145" y="322" class="tiny">20-30m</text>
    <text x="36" y="382" class="mono">split_audio_duration()</text>
  </g>

  <!-- Stage 3 -->
  <g transform="translate(785,260)">
    <rect width="215" height="420" rx="24" class="box job"/>
    <circle cx="36" cy="38" r="18" fill="#34d399"/><text x="29" y="46" class="stageNum">3</text>
    <text x="68" y="38" class="stageTitle">PROCESS</text>
    <text x="68" y="62" class="stageTitle">EACH CHUNK</text>
    <text x="28" y="98" class="stageSub">Sequential calls in isolation</text>
    <rect x="24" y="120" width="167" height="246" rx="18" fill="rgba(6,78,59,.32)" stroke="#34d399" stroke-dasharray="8 6"/>
    <text x="42" y="148" class="label">isolated child</text>
    <rect x="42" y="170" width="130" height="42" rx="12" fill="#0f172a" stroke="#34d399"/><text x="58" y="197" class="small">Chunk 1: OK</text>
    <rect x="42" y="226" width="130" height="42" rx="12" fill="#0f172a" stroke="#fb7185"/><text x="53" y="253" class="small">Chunk 2: error</text>
    <rect x="42" y="282" width="130" height="42" rx="12" fill="#0f172a" stroke="#34d399"/><text x="58" y="309" class="small">Chunk 3: OK</text>
    <text x="28" y="388" class="small">Fresh decoder per slice</text>
    <text x="28" y="410" class="small">Continue after chunk errors</text>
  </g>

  <!-- Stage 4 -->
  <g transform="translate(1095,260)">
    <rect width="215" height="420" rx="24" class="box data"/>
    <circle cx="36" cy="38" r="18" fill="#a78bfa"/><text x="29" y="46" class="stageNum">4</text>
    <text x="68" y="38" class="stageTitle">MERGE TO</text>
    <text x="68" y="62" class="stageTitle">GLOBAL TIME</text>
    <text x="28" y="98" class="stageSub">Restore recording-wide timestamps</text>
    <rect x="30" y="135" width="58" height="30" rx="8" fill="rgba(34,211,238,.25)" stroke="#22d3ee"/><text x="41" y="155" class="tiny">0-10</text>
    <rect x="93" y="135" width="58" height="30" rx="8" fill="rgba(251,191,36,.25)" stroke="#fbbf24"/><text x="101" y="155" class="tiny">10-20</text>
    <rect x="156" y="135" width="28" height="30" rx="8" fill="rgba(167,139,250,.25)" stroke="#a78bfa"/><text x="161" y="155" class="tiny">20+</text>
    <path d="M59 176 C72 218 95 232 107 260" class="arrowAmber"/>
    <path d="M122 176 C124 215 119 234 112 260" class="arrowAmber"/>
    <path d="M170 176 C156 218 132 232 117 260" class="arrowAmber"/>
    <rect x="28" y="262" width="158" height="42" rx="12" fill="rgba(76,29,149,.42)" stroke="#a78bfa"/>
    <text x="42" y="288" class="small">continuous timeline</text>
    <text x="28" y="340" class="mono">merge_chunk_segments()</text>
    <text x="28" y="365" class="small">ORTH Tier-2 aligns once</text>
    <text x="28" y="388" class="small">STT cache stays flat</text>
  </g>

  <!-- Stage 5 -->
  <g transform="translate(1405,260)">
    <rect width="325" height="420" rx="24" class="box data"/>
    <circle cx="36" cy="38" r="18" fill="#a78bfa"/><text x="29" y="46" class="stageNum">5</text>
    <text x="68" y="46" class="stageTitle">RESULT + OBSERVABILITY</text>
    <text x="28" y="82" class="stageSub">Merged output plus chunk diagnostics</text>
    <rect x="28" y="115" width="132" height="130" rx="16" fill="rgba(76,29,149,.42)" stroke="#a78bfa"/>
    <text x="48" y="145" class="label">Result</text>
    <text x="48" y="172" class="small">segments</text>
    <text x="48" y="196" class="small">ortho_words</text>
    <text x="48" y="220" class="small">filled / total</text>
    <rect x="176" y="115" width="121" height="130" rx="16" fill="rgba(15,23,42,.95)" stroke="#94a3b8"/>
    <text x="196" y="145" class="label">chunks[]</text>
    <text x="196" y="172" class="small">ok</text>
    <text x="196" y="196" class="small">error</text>
    <text x="196" y="220" class="small">cancelled</text>
    <rect x="52" y="279" width="220" height="34" rx="17" fill="#22d3ee"/>
    <text x="98" y="301" class="pillText">Chunk N of M</text>
    <rect x="52" y="331" width="220" height="44" rx="14" fill="rgba(251,113,133,.18)" stroke="#fb7185"/>
    <text x="72" y="358" class="small">partial results are explicit</text>
    <text x="52" y="405" class="small">Batch report colors mixed outcomes</text>
  </g>

  <!-- bottom notes -->
  <rect x="70" y="730" width="800" height="205" rx="22" fill="rgba(15,23,42,.92)" stroke="#334155"/>
  <text x="100" y="772" class="stageTitle">What fires chunking?</text>
  <text x="100" y="812" class="small">• Full-file STT longer than PARSE_STT_DEFAULT_CHUNK_MINUTES × 60 seconds.</text>
  <text x="100" y="842" class="small">• Full-pipeline or full-mode ORTH longer than PARSE_ORTH_DEFAULT_CHUNK_MINUTES × 60 seconds.</text>
  <text x="100" y="872" class="small">• Default chunk size is 10 minutes; setting the STT chunk value to 0 disables duration chunking.</text>
  <text x="100" y="902" class="small">• Cancellation is checked between chunks, so finished chunks remain usable.</text>

  <rect x="930" y="730" width="800" height="205" rx="22" fill="rgba(15,23,42,.92)" stroke="#334155"/>
  <text x="960" y="772" class="stageTitle">Important boundary</text>
  <text x="960" y="812" class="small">IPA does not chunk by audio duration. IPA operates on interval slices produced upstream by STT/ORTH windows.</text>
  <text x="960" y="842" class="small">The parent server remains protected by compute launchers and nested isolated subprocess envelopes.</text>
  <text x="960" y="872" class="small">Per-chunk failures become structured diagnostics instead of silently truncating or crashing the full run.</text>
  <text x="960" y="902" class="small">Grounded in docs/architecture/compute.md and worker-processes.md.</text>

  <!-- legend -->
  <g transform="translate(70,970)">
    <circle cx="10" cy="0" r="7" fill="#22d3ee"/><text x="25" y="5" class="tiny">UI / frontend</text>
    <circle cx="178" cy="0" r="7" fill="#34d399"/><text x="193" y="5" class="tiny">Backend / job runner</text>
    <circle cx="405" cy="0" r="7" fill="#fbbf24"/><text x="420" y="5" class="tiny">Chunking</text>
    <circle cx="548" cy="0" r="7" fill="#a78bfa"/><text x="563" y="5" class="tiny">Merged data / cache</text>
    <circle cx="770" cy="0" r="7" fill="#fb7185"/><text x="785" y="5" class="tiny">Error / cancel signal</text>
  </g>
</svg>